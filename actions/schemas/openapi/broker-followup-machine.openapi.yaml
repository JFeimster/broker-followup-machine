openapi: 3.1.0
info:
  title: Broker Follow-Up Machine API Draft
  version: 0.1.0
  description: Static OpenAPI draft for broker follow-up planning only.
servers:
  - url: https://example.com
paths:
  /lead-intake:
    post:
      summary: Submit a lead intake payload
      operationId: submitLeadIntake
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - record_type
                - workflow_id
                - business_name
                - contact_name
              properties:
                record_type:
                  type: string
                  const: lead-intake
                workflow_id:
                  type: string
                  enum:
                    - new-lead
                    - missing-docs
                    - stalled-deal
                    - declined-reactivation
                    - funded-renewals
                    - referral-nurture
                    - dead-lead-revival
                business_name:
                  type: string
                contact_name:
                  type: string
                human_review_required:
                  type: boolean
      responses:
        "200":
          description: Draft accepted for review
  /workflow-request:
    post:
      summary: Request a workflow draft
      operationId: requestWorkflowDraft
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - workflow_id
                - audience
                - goal
              properties:
                workflow_id:
                  type: string
                audience:
                  type: string
                goal:
                  type: string
                human_review_required:
                  type: boolean
      responses:
        "200":
          description: Draft accepted for review
